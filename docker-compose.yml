services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: team_task_manage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - team_nexus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d team_task_manage"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/team_task_manage
      DB_HOST: db
      DB_PORT: 5432
      APP_NAME: Team Task Manager
      APP_VERSION: 0.1.0
      ENVIRONMENT: development
      SECRET_KEY: your-super-secret-key-change-this-in-production-use-secrets-module
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      BCRYPT_ROUNDS: 12
    ports:
      - "8000:8000"
    networks:
      - team_nexus_network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  team_nexus_network:
    driver: bridge
